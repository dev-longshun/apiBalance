<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quota Sentinel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="app">
    <header>
      <h1>Quota Sentinel</h1>
      <div>
        <button class="btn btn-secondary btn-sm" onclick="toggleSettings()">Settings</button>
      </div>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="value" id="stat-total">0</div>
        <div class="label">Site Count</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-balance">$0</div>
        <div class="label">Total Balance</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-alerts">0</div>
        <div class="label">Alerts</div>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn btn-primary" onclick="showAddModal()">+ Add Site</button>
      <button class="btn btn-secondary" id="btn-refresh" onclick="refreshAll()">Refresh All</button>
    </div>

    <div class="site-list" id="site-list"></div>

    <div class="settings-panel" id="settings-panel" style="display:none">
      <h2>Settings</h2>
      <div class="settings-row">
        <label>Polling Interval (min):</label>
        <input type="number" id="set-interval" min="5" value="30">
      </div>
      <div class="settings-row">
        <label>Telegram Bot Token:</label>
        <input type="password" id="set-token" placeholder="7000000000:AAxxxxxxxxx">
      </div>
      <div class="settings-row">
        <label>Telegram Chat ID:</label>
        <input type="text" id="set-chatid" placeholder="123456789">
      </div>
      <div class="toolbar" style="margin-top:12px">
        <button class="btn btn-secondary btn-sm" onclick="testTelegram()">Send Test</button>
        <button class="btn btn-success btn-sm" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h2 id="modal-title">Add Site</h2>
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="f-name" placeholder="My API">
      </div>
      <div class="form-group">
        <label>Base URL</label>
        <input type="text" id="f-url" placeholder="https://api.example.com">
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="text" id="f-key" placeholder="sk-xxxxxxxx">
      </div>
      <div class="form-group">
        <label>Auth Type</label>
        <select id="f-auth">
          <option value="bearer">Bearer Token</option>
          <option value="url_key">URL Key</option>
        </select>
      </div>
      <div class="form-group">
        <label>Alert Thresholds (comma separated)</label>
        <input type="text" id="f-thresholds" placeholder="50, 10" value="10">
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitSite()">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
