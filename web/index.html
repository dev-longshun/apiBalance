<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上游渠道额度监控</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="app">
    <header>
      <h1>上游渠道额度监控</h1>
      <div>
        <button class="btn btn-secondary btn-sm" onclick="toggleSettings()">设置</button>
        <button class="btn btn-secondary btn-sm" id="btn-logout" style="display:none" onclick="doLogout()">退出</button>
      </div>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="value" id="stat-total">0</div>
        <div class="label">站点数量</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-balance">$0</div>
        <div class="label">总余额</div>
      </div>
      <div class="stat-card">
        <div class="value" id="stat-alerts">0</div>
        <div class="label">告警</div>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn btn-primary" onclick="showAddModal()">+ 添加站点</button>
      <button class="btn btn-secondary" id="btn-refresh" onclick="refreshAll()">刷新全部</button>
    </div>

    <div class="site-list" id="site-list"></div>

  </div>

  <div class="modal-overlay" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h2 id="modal-title">添加站点</h2>
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label>站点名称</label>
        <input type="text" id="f-name" placeholder="例：小火箭">
      </div>
      <div class="form-group">
        <label>接口地址</label>
        <input type="text" id="f-url" placeholder="https://api.example.com">
      </div>
      <div class="form-group">
        <label>用户名（NewAPI 登录查询）</label>
        <input type="text" id="f-username" placeholder="留空则使用 API Key 查询">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="f-password" placeholder="留空则使用 API Key 查询">
      </div>
      <div class="form-group">
        <label>User ID（可选，留空自动获取）</label>
        <input type="text" id="f-userid" placeholder="0">
      </div>
      <div class="form-group">
        <label>API Key（无用户名密码时使用）</label>
        <input type="text" id="f-key" placeholder="sk-xxxxxxxx">
      </div>
      <div class="form-group">
        <label>认证方式</label>
        <select id="f-auth">
          <option value="bearer">Bearer Token</option>
          <option value="url_key">URL 参数</option>
        </select>
      </div>
      <div class="form-group">
        <label>告警阈值（逗号分隔，如 50, 10）</label>
        <input type="text" id="f-thresholds" placeholder="50, 10" value="10">
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="submitSite()">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="settings-modal" style="display:none" onclick="if(event.target===this)closeSettings()">
    <div class="modal">
      <h2>系统设置</h2>
      <div class="form-group">
        <label>轮询间隔（分钟）</label>
        <input type="number" id="set-interval" min="5" value="30">
      </div>
      <div class="form-group">
        <label>Telegram Bot Token</label>
        <input type="password" id="set-token" placeholder="7000000000:AAxxxxxxxxx">
      </div>
      <div class="form-group">
        <label>Telegram Chat ID</label>
        <input type="text" id="set-chatid" placeholder="123456789">
      </div>
      <div class="form-actions">
        <button class="btn btn-secondary btn-sm" onclick="testTelegram()">发送测试</button>
        <button class="btn btn-secondary" onclick="closeSettings()">取消</button>
        <button class="btn btn-primary" onclick="saveSettings()">保存</button>
      </div>
    </div>
  </div>

  <div class="login-overlay" id="login-overlay" style="display:none">
    <div class="login-box">
      <h2>上游渠道额度监控</h2>
      <p style="color:#64748b;font-size:0.9rem;margin-bottom:16px">管理员登录</p>
      <div class="form-group">
        <input type="text" id="login-username" placeholder="用户名" onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()">
      </div>
      <div class="form-group">
        <input type="password" id="login-password" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="doLogin()">登录</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
